name: Build Windows EXE

# Builds a standalone WisprClone.exe on a GitHub-hosted Windows machine and
# attaches it to the v1.0 release — so users just download and double-click,
# no Python needed. Runs automatically when the Windows app changes, or manually.
on:
  workflow_dispatch:
  push:
    paths:
      - "windows/**"
      - ".github/workflows/build-windows.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r windows/requirements.txt pyinstaller

      - name: Make app icon (.ico)
        run: |
          python -c "from PIL import Image; Image.open('tools/icon_1024.png').save('windows/wispr.ico', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])"

      - name: Build standalone EXE (normal, no console)
        run: >
          pyinstaller --onefile --noconsole --name WisprClone
          --icon windows/wispr.ico
          --collect-all speech_recognition
          --collect-all pyaudio
          windows/wispr_windows.py

      - name: Build debug EXE (shows a console with errors)
        run: >
          pyinstaller --onefile --console --name WisprClone-Debug
          --icon windows/wispr.ico
          --collect-all speech_recognition
          --collect-all pyaudio
          windows/wispr_windows.py

      - name: Upload EXEs to the v1.0 release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload v1.0 dist/WisprClone.exe dist/WisprClone-Debug.exe --clobber --repo ${{ github.repository }}
